<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Study Hub</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="register-page">
  <div class="register-shell">
    <div class="register-content">
      <div class="brand-bar">
        <span>Registration</span>
        <h1>Join Study Hub</h1>
        <p>Create your account to unlock science and maths resources for Grades 9–12.</p>
      </div>

      <form action="choosing.html" method="get">
        <div class="input-group">
          <label for="fullname">Full name</label>
          <input type="text" id="fullname" name="fullname" placeholder="Your full name" required />
        </div>

        <div class="input-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />
        </div>

        <div class="input-group">
          <label for="grade">Select grade</label>
          <input type="text" id="grade" name="grade" placeholder="9th, 10th, 11th or 12th" required />
        </div>

        <div class="input-group">
          <label for="phone">Phone number</label>
          <input type="tel" id="phone" name="phone" placeholder="e.g. +91 98765 43210" required />
        </div>

        <div class="input-group">
          <label for="password">Create password</label>
          <input type="password" id="password" name="password" placeholder="Minimum 8 characters" required />
        </div>

        <div id="registration-error" class="error-box" style="display:none;"></div>

        <button class="register-button" type="submit">Register now</button>
      </form>

      <div class="hint-row">
        <span>Already have an account?</span>
        <a href="index.html">Back to login</a>
      </div>

      <div class="note-box">
        <strong>Tip:</strong> Use a real email to get the best study updates and quick access to new practice sheets.
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
